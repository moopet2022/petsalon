<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>寵物美容契約</title>

<style>

body{
font-family:sans-serif;
background:#f7f3ef;
padding:20px;
}

.label{
font-weight:bold;
margin-top:20px;
}

.input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-top:5px;
}

.checkRow{
background:white;
padding:15px;
border-radius:10px;
border:1px solid #e0d5c8;
margin-top:5px;
}

.checkRow label{
display:block;
margin-bottom:5px;
}

button{
margin-top:20px;
width:100%;
padding:15px;
background:#C35A2E;
color:white;
border:none;
border-radius:10px;
font-size:18px;
}

canvas{
border:1px solid #ccc;
width:100%;
height:200px;
background:white;
border-radius:10px;
}

</style>

</head>

<body>

<h2>寵物美容契約</h2>

<form id="contractForm">

<div class="label">Email</div>
<input id="email" class="input">

<div class="label">寵物姓名</div>
<input id="petName" class="input">

<div class="label">寵物品種</div>
<input id="petBreed" class="input">

<div class="label">體重</div>
<input id="petWeight" class="input">


<div class="label">零食</div>

<div class="checkRow">

<label><input type="radio" name="snack" value="可以"> 可以</label>

<label><input type="radio" name="snack" value="不可以"> 不可以</label>

</div>


<div class="label">病史</div>

<div class="checkRow">

<label><input type="checkbox" name="disease" value="無病史"> 無病史</label>

<label><input type="checkbox" name="disease" value="心臟病"> 心臟病</label>

<label><input type="checkbox" name="disease" value="氣管塌陷"> 氣管塌陷</label>

<label><input type="checkbox" name="disease" value="白內障"> 白內障</label>

<label><input type="checkbox" name="disease" value="癲癇"> 癲癇</label>

<label><input type="checkbox" name="disease" value="骨折"> 骨折</label>

<label><input type="checkbox" name="disease" value="關節問題"> 關節問題</label>

<label><input type="checkbox" name="disease" value="腸炎"> 腸炎</label>

</div>


<div class="label">其他注意事項</div>

<input id="petNotice" class="input">


<div class="label">動物醫院名稱</div>

<input id="hospitalName" class="input">


<div class="label">動物醫院電話</div>

<input id="hospitalPhone" class="input">


<div class="label">簽名</div>

<canvas id="signature"></canvas>

<button type="button" id="clearSign">清除簽名</button>

<button type="submit">送出契約</button>

</form>

<script>

const GAS_URL="貼上你的GAS網址";

const canvas=document.getElementById("signature");

const ctx=canvas.getContext("2d");

let drawing=false;

canvas.addEventListener("mousedown",()=>drawing=true);

canvas.addEventListener("mouseup",()=>drawing=false);

canvas.addEventListener("mousemove",draw);

function draw(e){

if(!drawing)return;

const rect=canvas.getBoundingClientRect();

ctx.lineWidth=2;

ctx.lineCap="round";

ctx.lineTo(e.clientX-rect.left,e.clientY-rect.top);

ctx.stroke();

ctx.beginPath();

ctx.moveTo(e.clientX-rect.left,e.clientY-rect.top);

}

document.getElementById("clearSign").onclick=()=>{

ctx.clearRect(0,0,canvas.width,canvas.height);

}

function getCheckboxValues(name){

const checked=document.querySelectorAll(`input[name="${name}"]:checked`);

return Array.from(checked).map(el=>el.value).join(",");

}

document.getElementById("contractForm").addEventListener("submit",function(e){

e.preventDefault();

const data={

email:document.getElementById("email").value,

petName:document.getElementById("petName").value,

petBreed:document.getElementById("petBreed").value,

petWeight:document.getElementById("petWeight").value,

snack:document.querySelector('input[name="snack"]:checked')?.value||"",

disease:getCheckboxValues("disease"),

petNotice:document.getElementById("petNotice").value,

hospitalName:document.getElementById("hospitalName").value,

hospitalPhone:document.getElementById("hospitalPhone").value,

signature:canvas.toDataURL()

};

fetch(GAS_URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(res=>{
alert("契約已完成簽署")
});

});

</script>

</body>
</html>
